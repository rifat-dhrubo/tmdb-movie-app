<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient background -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    
    <!-- Subtle noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
    
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Gold gradient for text -->
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f4e4ba"/>
      <stop offset="50%" style="stop-color:#d4af37"/>
      <stop offset="100%" style="stop-color:#f4e4ba"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>
  
  <!-- Film strip decoration on left -->
  <g opacity="0.1">
    <rect x="40" y="50" width="60" height="530" fill="none" stroke="#d4af37" stroke-width="2"/>
    <rect x="50" y="65" width="40" height="30" fill="#d4af37"/>
    <rect x="50" y="115" width="40" height="30" fill="#d4af37"/>
    <rect x="50" y="165" width="40" height="30" fill="#d4af37"/>
    <rect x="50" y="215" width="40" height="30" fill="#d4af37"/>
    <rect x="50" y="265" width="40" height="30" fill="#d4af37"/>
    <rect x="50" y="315" width="40" height="30" fill="#d4af37"/>
    <rect x="50" y="365" width="40" height="30" fill="#d4af37"/>
    <rect x="50" y="415" width="40" height="30" fill="#d4af37"/>
    <rect x="50" y="465" width="40" height="30" fill="#d4af37"/>
    <rect x="50" y="515" width="40" height="30" fill="#d4af37"/>
    <rect x="50" y="565" width="40" height="30" fill="#d4af37"/>
  </g>
  
  <!-- Decorative circle -->
  <circle cx="900" cy="150" r="300" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.15"/>
  <circle cx="950" cy="200" r="250" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.1"/>
  
  <!-- Main content group -->
  <g transform="translate(0, 0)">
    <!-- CINE logo/text -->
    <text x="600" y="280" 
          font-family="Georgia, serif" 
          font-size="120" 
          font-weight="bold" 
          fill="url(#gold-gradient)" 
          text-anchor="middle"
          filter="url(#glow)"
          letter-spacing="0.15em">CINE</text>
    
    <!-- Tagline -->
    <text x="600" y="350" 
          font-family="Georgia, serif" 
          font-size="32" 
          fill="#f4e4ba" 
          text-anchor="middle"
          opacity="0.9"
          letter-spacing="0.1em">Curate Your Cinema</text>
    
    <!-- Subtitle -->
    <text x="600" y="420" 
          font-family="-apple-system, BlinkMacSystemFont, sans-serif" 
          font-size="20" 
          fill="#888" 
          text-anchor="middle"
          letter-spacing="0.05em">Discover. Track. Remember.</text>
  </g>
  
  <!-- Bottom URL -->
  <text x="600" y="580" 
        font-family="-apple-system, BlinkMacSystemFont, sans-serif" 
        font-size="16" 
        fill="#666" 
        text-anchor="middle"
        letter-spacing="0.1em">movies.rifathossain.dev</text>
</svg>
